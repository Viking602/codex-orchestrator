interface:
  display_name: "Codex Orchestrator"
  short_description: "File-backed orchestration for specs, plans, runtime state, and review gates."
  icon_small: "./assets/icon-small.svg"
  icon_large: "./assets/logo.svg"
  default_prompt: "Use Codex Orchestrator to create and maintain a spec, an implementation plan, runtime orchestration state, and review gates while executing bounded tasks."

policy:
  allow_implicit_invocation: true

agents:
  codex:
    path: "../codex/agents/"
    format: "toml"
    agents:
      - harness-planner
      - harness-dispatch-gate
      - search-specialist
      - backend-developer
      - harness-evaluator
      - harness-doc-gardener

note: |
  This plugin relies on Codex native subagents for execution and uses the plugin-local MCP server as the control-plane and state-plane.
  The plugin bundles a small codex agent set under `codex/agents/` for the preferred planning, research, implementation, review, dispatch, and routing-doc paths.
  If a host does not auto-register plugin-bundled agents, use these `.toml` files as the install source for `.codex/agents/` or `~/.codex/agents/`.
