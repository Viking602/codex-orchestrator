[plan]
intent = "planning"
preferred_role = "harness-planner"
allowed_roles = ["harness-planner", "research-analyst"]
write_policy = "docs-only"
requires_plan = false
requires_spec_review = true
requires_quality_review = true
parallelism = "single"
reuse_policy = "same_task_only"
completion_contract = ["artifact_written", "plan_synced"]

[research]
intent = "research"
preferred_role = "search-specialist"
allowed_roles = ["search-specialist", "research-analyst", "docs-researcher", "code-mapper"]
write_policy = "read-only"
requires_plan = false
requires_spec_review = false
requires_quality_review = false
parallelism = "parallel"
reuse_policy = "no_reuse"
completion_contract = ["findings_recorded"]

[backend-impl]
intent = "implementation"
preferred_role = "backend-developer"
allowed_roles = ["backend-developer", "typescript-pro", "fullstack-developer"]
write_policy = "lease-required"
requires_plan = true
requires_spec_review = true
requires_quality_review = true
parallelism = "write-scope"
reuse_policy = "same_task_same_role_same_scope"
completion_contract = ["all_steps_checked", "verification_recorded", "spec_review_passed", "quality_review_passed", "task_accepted"]

[review]
intent = "review"
preferred_role = "harness-evaluator"
allowed_roles = ["harness-evaluator", "reviewer", "code-reviewer", "qa-expert"]
write_policy = "read-only"
requires_plan = true
requires_spec_review = false
requires_quality_review = false
parallelism = "parallel"
reuse_policy = "no_reuse"
completion_contract = ["review_recorded"]
